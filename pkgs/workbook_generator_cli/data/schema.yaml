# yaml-language-server: $schema=workbook_schema.json

# # ============================================================================
# # WORKBOOK SCHEMA - Multiple Document Format
# # ============================================================================
# # This YAML file contains multiple documents separated by ---
# # Each document represents a different week in the workbook.
# # Three types of weeks are supported:
# #
# # 1. Normal Meeting Week - regular weekly meetings with full programming
# # 2. Special Event Week - no meeting (e.g., convention, assembly, special event)
# # 3. Visit Week - visiting speaker replaces the congregation study
# # ============================================================================

- week: 4-10 de maio
  bible_reading: ISAÍAS 58-59
  songs:
    - Cântico 21
    - Cântico 100
    - Cântico 42
  prayers:
    - Alexandre Amorim
    - Jossefa Manheia
  chairman: Alexandre Amorim
  initial_comments:
    who: Alexandre Amorim
    duration: 1 min
  treasures:
    speech:
      who: João Vitor
      title: Receba muitas bençãos de Jeová
      duration: 10 min
    jewels:
      who: Deyan Almeida
      duration: 10 min
    bible_reading:
      who: Juarez Pereira
      duration: 4 min
  ministry:
    - title: "4. Iniciando conversas"
      duration: 3 min
      who:
        - Luan Ribeiro
        - Cássio Marcos
    - title: "5. Iniciando conversas"
      duration: 4 min
      who:
        - Waldeck Junior
        - Juvenal Junior
  christian_life:
